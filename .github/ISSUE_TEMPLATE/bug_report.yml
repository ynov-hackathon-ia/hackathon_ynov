name: Bug report
description: Report a problem with the chat, the model, or the tooling
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I send a message, the app shows...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Ollama with `./rendu/infra/scripts/setup_ollama.sh`
        2. Run `streamlit run app.py`
        3. Ask "..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web interface (Streamlit)
        - Inference (Ollama / Triton)
        - Model / dataset
        - CI / tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Ollama version, etc.
    validations:
      required: false
