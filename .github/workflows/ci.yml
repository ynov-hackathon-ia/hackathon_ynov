name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: jobs only need to read the repository.
permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.20"
      - name: Lint
        run: ruff check --output-format=github .
      - name: Format check
        run: ruff format --check .

  smoke-devweb:
    name: Smoke test (Streamlit app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install web dependencies
        run: pip install -r rendu/devweb/requirements.txt
      - name: Byte-compile the app
        run: python -m py_compile rendu/devweb/app.py
      - name: Import smoke test
        env:
          # The app reads Ollama config from the environment at import time.
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          python - <<'PY'
          from importlib.util import module_from_spec, spec_from_file_location
          from unittest.mock import Mock, patch

          response = Mock()
          response.raise_for_status.return_value = None

          spec = spec_from_file_location("devweb_app", "rendu/devweb/app.py")
          module = module_from_spec(spec)
          with patch("requests.get", return_value=response):
              spec.loader.exec_module(module)
          PY

  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          # Infra scripts only land once the infra branch is merged; never fail
          # the run when there is nothing to scan.
          ignore_paths: datasets models logs

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the open-source gitleaks CLI directly. The gitleaks GitHub Action
      # requires a paid license on organization-owned repos; the CLI does not.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
