services:
  triton:
    build:
      context: ..
      dockerfile: tritton_server/Dockerfile
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    volumes:
      - ../model_repository:/models
      - ~/.cache/huggingface:/root/.cache/huggingface
    # Pour le rendu sur machine GPU, décommentez la section ci-dessous :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
