title = "TechCorp AI Chat - gitleaks config"

# Build on top of gitleaks' default rule set.
[extend]
useDefault = true

[allowlist]
description = """
The inherited logs/ are intentional challenge artifacts: the project ships a
"compromised inheritance" with planted indicators (e.g. a base64 X-Compliance-Token
and a trigger phrase) that the Cyber track audits in rendu/cyber. These are part of
the exercise, not real credentials, so they are excluded from the secret scan. All
other paths are still scanned for genuine leaks.
"""
paths = [
  '''logs/.*''',
]
